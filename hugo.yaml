baseURL: "https://xananode.com/"
languageCode: "en-us"
title: "XanaNode"
contentDir: "exampleSite/content"
dataDir: "exampleSite/data"

params:
  description: "A relationship-first knowledge substrate for publishing connected nodes, sources, claims, trails, and protocol artifacts."
  author: "XanaNode Contributors"
  tagline: "Relationships preserve knowledge."
  keywords:
    - knowledge graph
    - digital garden
    - provenance
    - hypertext
    - semantic publishing
    - XanaNode
  themeColor: "#55d6be"
  image: "xananode-icon.svg"
  analytics:
    gtag: "G-W8Q2NVJ8PL"
    plausibleDomain: ""
    plausibleSrc: "https://plausible.io/js/script.js"
  xananode:
    namespace: "xananode.example"
    links:
      - label: "Protocol"
        node: "xananode-protocol-repo"
        url: "https://github.com/kingc95/xananode"
      - label: "Core SDK"
        node: "xananode-core-sdk-repo"
        url: "https://github.com/kingc95/XanaNode-Core-SDK"
      - label: "Hugo"
        node: "xananode-hugo-repo"
        url: "https://github.com/kingc95/XanaNode-Hugo"
      - label: "Workspace"
        node: "xananode-workspace-repo"
        url: "https://github.com/kingc95/XanaNode-Workspace"

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - JSON

permalinks:
  page:
    claims: "/claim/:slug/"
    concepts: "/concept/:slug/"
    essays: "/essay/:slug/"
    media: "/media/:slug/"
    observations: "/observation/:slug/"
    people: "/person/:slug/"
    projects: "/project/:slug/"
    schemas: "/schema/:slug/"
    sources: "/source/:slug/"
    technologies: "/technology/:slug/"
    trails: "/trail/:slug/"
