<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title desc">
  <title id="title">XanaNode Icon</title>
  <desc id="desc">An abstract X-shaped network logo with a central node and blue and orange relationship lines connecting outer nodes.</desc>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

    <linearGradient id="blueLine" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D47A1"/>
      <stop offset="1" stop-color="#1976D2"/>
    </linearGradient>

    <linearGradient id="orangeLine" x1="96" y1="416" x2="416" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8C00"/>
      <stop offset="1" stop-color="#FF5A00"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7FFFE8"/>
      <stop offset="1" stop-color="#55D6BE"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="72" fill="#05070A"/>

  <g filter="url(#softShadow)">
    <path d="M108 112 C176 70 222 178 256 256 C292 338 336 444 404 400"
          fill="none" stroke="url(#blueLine)" stroke-width="32" stroke-linecap="round"/>

    <path d="M404 112 C336 70 292 178 256 256 C222 338 176 444 108 400"
          fill="none" stroke="url(#orangeLine)" stroke-width="32" stroke-linecap="round"/>

    <path d="M108 112 C178 168 210 210 256 256 C302 302 334 344 404 400"
          fill="none" stroke="#64B5F6" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

    <path d="M108 400 C178 344 210 302 256 256 C302 210 334 168 404 112"
          fill="none" stroke="#FFB347" stroke-width="10" stroke-linecap="round" opacity="0.95"/>

    <circle cx="256" cy="256" r="44" fill="url(#centerGlow)" stroke="#EFFFFB" stroke-width="8"/>

    <circle cx="108" cy="112" r="34" fill="#0D47A1" stroke="#E8F3FF" stroke-width="8"/>
    <circle cx="404" cy="400" r="34" fill="#1976D2" stroke="#E8F3FF" stroke-width="8"/>
    <circle cx="404" cy="112" r="34" fill="#FF5A00" stroke="#FFF2E3" stroke-width="8"/>
    <circle cx="108" cy="400" r="34" fill="#FF8C00" stroke="#FFF2E3" stroke-width="8"/>

    <circle cx="186" cy="178" r="14" fill="#55D6BE" stroke="#EFFFFB" stroke-width="5"/>
    <circle cx="326" cy="178" r="14" fill="#55D6BE" stroke="#EFFFFB" stroke-width="5"/>
    <circle cx="186" cy="334" r="14" fill="#55D6BE" stroke="#EFFFFB" stroke-width="5"/>
    <circle cx="326" cy="334" r="14" fill="#55D6BE" stroke="#EFFFFB" stroke-width="5"/>
  </g>
</svg>
