name: Validate and build example site

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Check out canonical substrate sibling
        run: git clone --depth 1 https://github.com/kingc95/XanaNode-Canonical-Substrate.git ../XanaNode-Canonical-Substrate
      - name: Provide lowercase theme path for Hugo on Linux
        run: ln -s "$GITHUB_WORKSPACE" ../xananode-hugo
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true
      - name: Validate XanaNode example substrate
        run: npm run validate
      - name: Build XanaNode example substrate
        run: npm run example:build
