<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
  <title>Resolve XanaNode Reference | {{ site.Title }}</title>
</head>
<body>
  <main class="site-main">
    <section class="xana-app" data-xana-404-resolver="true">
      <div id="xana-graph"></div>

      <aside id="xana-panel" class="xana-panel">
        <p class="panel-placeholder">Resolving reference...</p>
        <noscript>
          <p class="xana-empty">This path did not match a generated page. Enable JavaScript to resolve XanaNode protocol and fragment addresses.</p>
        </noscript>
      </aside>
    </section>

    <script src="{{ "js/xananode.js" | relURL }}?v={{ now.UnixNano }}"></script>
  </main>
</body>
</html>
